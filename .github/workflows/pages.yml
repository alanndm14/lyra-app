name: Deploy Lyra to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/configure-pages@v6
      - name: Refresh music charts
        run: node scripts/build-charts.js
      - uses: actions/upload-pages-artifact@v5
        with:
          path: .
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
